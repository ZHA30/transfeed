translate:
  systemPrompt: |
    You are a translation engine.
    Translate the input into the target language.
    Output plain text only.
    Do not add commentary or Markdown formatting.

summary:
  systemPrompt: |
    你是一个摘要生成器。
    根据输入内容生成摘要。
    只输出 Markdown 正文，无需解释、开场白等。

feeds:
  - path: /ycombinator/news
    url: https://news.ycombinator.com/rss
    translate:
      targetLanguage: zh-CN
      fields:
        - title

  - path: /bbc
    url: https://feeds.bbci.co.uk/news/rss.xml
    translate:
      targetLanguage: zh-CN
      fields:
        - title

  - path: /readwise
    url: https://wise.readwise.io/feed
    translate:
      targetLanguage: zh-CN
      fields:
        - title
        - content:encoded
    limit: 10

  - path: /nytimes/world
    url: https://rss.nytimes.com/services/xml/rss/nyt/world.xml
    translate:
      targetLanguage: zh-CN
      fields:
        - title

  - path: /typesetinthefuture/feed
    url: https://typesetinthefuture.com/feed/
    translate:
      targetLanguage: zh-CN
      fields:
        - title

  - path: /construction-physics/feed
    url: https://www.construction-physics.com/feed
    translate:
      targetLanguage: zh-CN
      fields:
        - title

  - path: /lithub/feed
    url: https://lithub.com/feed
    translate:
      targetLanguage: zh-CN
      fields:
        - title
        - description

  - path: /kcna/kp/latest-news
    url: https://rss.20260501.xyz/kcna/kp/latest-news?key=${{ secrets.RSSHUB_KEY }}
    translate:
      targetLanguage: zh-CN
      fields:
        - title
        - description
      mode: translation

  - path: /chosun/politics
    url: https://rss.20260501.xyz/chosun/politics?key=${{ secrets.RSSHUB_KEY }}
    translate:
      targetLanguage: zh-CN
      fields:
        - title
        - description
      mode: translation

  - path: /yna/latest
    url: https://rss.20260501.xyz/yna/latest?key=${{ secrets.RSSHUB_KEY }}&limit=10&mode=fulltext
    translate:
      targetLanguage: zh-CN
      fields:
        - title
        - description
      mode: translation

  - path: /nikkei/news
    url: https://rss.20260501.xyz/nikkei/news?key=${{ secrets.RSSHUB_KEY }}
    translate:
      targetLanguage: zh-CN
      fields:
        - title
        - description
      mode: translation

  - path: /yomiuri/news
    url: https://rss.20260501.xyz/yomiuri/news?key=${{ secrets.RSSHUB_KEY }}
    translate:
      targetLanguage: zh-CN
      fields:
        - title
        - description
      mode: translation

  - path: /nhk/news_web/latest
    url: https://rss.20260501.xyz/nhk/news_web/latest?key=${{ secrets.RSSHUB_KEY }}
    translate:
      targetLanguage: zh-CN
      fields:
        - title
        - description
      mode: translation

  - path: /bikerumor/feed
    url: https://bikerumor.com/feed
    translate:
      targetLanguage: zh-CN
      fields:
        - title
        - content:encoded

  - path: /purplemanager/bikeradar-news
    url: https://feeds.purplemanager.com/193c804a-a673-47bd-b09b-11baf4822a17/bikeradar-news
    translate:
      targetLanguage: zh-CN
      fields:
        - title
        - content:encoded
